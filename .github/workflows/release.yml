name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            artifact: installer-windows
            artifact_glob: |
              dist_electron/*.exe
              dist_electron/*.blockmap
              dist_electron/latest.yml
          - os: macos-latest
            platform: mac
            artifact: installer-macos
            artifact_glob: |
              dist_electron/*.dmg
              dist_electron/*.zip
              dist_electron/*.blockmap
              dist_electron/latest-mac.yml
          - os: ubuntu-latest
            platform: linux
            artifact: installer-linux
            artifact_glob: |
              dist_electron/*.AppImage
              dist_electron/latest-linux.yml
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Rodar testes
        run: npm test

      - name: Habilitar long paths (Windows)
        if: matrix.platform == 'win'
        run: git config --global core.longpaths true

      - name: Build Electron
        run: npm run electron:build:${{ matrix.platform }} -- --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_ENV: production
          VITE_BASE_URL: /
          VITE_URL_DATABASE: ${{ vars.VITE_URL_DATABASE }}
          VITE_URL_FILES: ${{ vars.VITE_URL_FILES }}
          VITE_API_TOKEN: ${{ secrets.VITE_API_TOKEN }}
          VITE_APP_VERSION: ${{ github.ref_name }}
          # Sem code signing automático no macOS — requer certificado pago
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload instalador
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact_glob }}
          retention-days: 7
          if-no-files-found: error
